<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Calculadora</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <!-- bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <body>
    <h1>CALCULADORA</h1>
    <h3>Maria Elena Calle Mamani</h3>

    Primer número:
    <input type="text" id="valor1" />
    <br /><br />

    Segundo número:
    <input type="text" id="valor2" />
    <br /><br />
    <button id="sumar" type="button" class="btn btn-outline-primary">
      Sumar
    </button>
    <button id="restar" type="button" class="btn btn-outline-secondary">
      Restar
    </button>
    <button id="multiplicar" type="button" class="btn btn-outline-success">
      Multiplicar
    </button>
    <button id="dividir" type="button" class="btn btn-outline-danger">
      Dividir
    </button>

    <br /><br />

    Resultado:
    <input type="text" id="resultado" />

    <script>
      $(document).ready(function () {
        $("#sumar").click(function () {
          let num1 = parseInt($("#valor1").val());
          let num2 = parseInt($("#valor2").val());

          if (isNaN(num1) || isNaN(num2)) {
            alert("Ingrese números válidos");
            $("#resultado").val("");
          } else {
            $("#resultado").val(num1 + num2);
          }
        });

        $("#restar").click(function () {
          let num1 = parseInt($("#valor1").val());
          let num2 = parseInt($("#valor2").val());

          if (isNaN(num1) || isNaN(num2)) {
            alert("Ingrese números válidos");
            $("#resultado").val("");
          } else {
            $("#resultado").val(num1 - num2);
          }
        });

        $("#multiplicar").click(function () {
          let num1 = parseInt($("#valor1").val());
          let num2 = parseInt($("#valor2").val());

          if (isNaN(num1) || isNaN(num2)) {
            alert("Ingrese números válidos");
            $("#resultado").val("");
          } else {
            $("#resultado").val(num1 * num2);
          }
        });

        $("#dividir").click(function () {
          let num1 = parseInt($("#valor1").val());
          let num2 = parseInt($("#valor2").val());

          if (isNaN(num1) || isNaN(num2)) {
            alert("Ingrese números válidos");
            $("#resultado").val("");
          } else if (num2 === 0) {
            alert("Error: División por cero");
            $("#resultado").val("");
          } else {
            $("#resultado").val(num1 / num2);
          }
        });
      });
    </script>
  </body>
</html>
